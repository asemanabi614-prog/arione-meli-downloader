name: دانلودر حرفه‌ای

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'لینک‌های دانلود (با کاما یا فاصله جدا کنید)'
        required: true
        type: string
      mode:
        description: 'حالت خروجی'
        required: false
        type: choice
        default: 'auto'
        options:
          - 'auto'
          - 'zip-single'
      webhook_url:
        description: 'آدرس بازگشت نتیجه (اختیاری)'
        required: false
        type: string

permissions:
  contents: write
  actions: write
  checks: read

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      artifact_url: ${{ steps.get-artifact.outputs.url }}
      status: ${{ steps.status.outputs.result }}
      
    steps:
      - uses: actions/checkout@v4
      
      - name: نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip
          
      - name: دانلود فایل‌ها
        id: download
        run: |
          mkdir -p downloads temp
          cd temp
          
          URLS="${{ github.event.inputs.urls }}"
          # تبدیل جداکننده‌ها به فاصله
          URLS=$(echo "$URLS" | tr ',' ' ' | tr '\n' ' ')
          
          for URL in $URLS; do
            echo "📥 دانلود: $URL"
            aria2c -x 4 -s 4 -k 5M --timeout=30 --max-tries=3 "$URL"
          done
          
          cd ..
          
      - name: تقسیم فایل‌های بزرگ
        run: |
          LIMIT_MB=90
          LIMIT_BYTES=$((LIMIT_MB * 1024 * 1024))
          
          for FILE in temp/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            NAME=$(basename "$FILE")
            
            if [ $SIZE -gt $LIMIT_BYTES ]; then
              echo "✂️ تقسیم $NAME (حجم: $((SIZE/1024/1024))MB)"
              split -b $LIMIT_BYTES -d "$FILE" "downloads/${NAME}_part_" --additional-suffix=".part"
              
              # فایل راهنما
              cat > "downloads/${NAME}_README.txt" << EOF
🔧 راهنمای ترکیب $NAME

برای ترکیب قطعات در ویندوز:
    copy /b ${NAME}_part_*.part $NAME

در لینوکس/مک:
    cat ${NAME}_part_*.part > $NAME
EOF
            else
              cp "$FILE" "downloads/$NAME"
            fi
          done
          
          rm -rf temp
          
      - name: ساخت آرشیو نهایی
        run: |
          cd downloads
          ZIP_NAME="Download_$(date +%Y%m%d_%H%M%S).zip"
          zip -r "../$ZIP_NAME" . -x "*.tmp"
          cd ..
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT
          echo "✅ آرشیو ساخته شد: $ZIP_NAME"
          
      - name: آپلود به Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Download_Result
          path: ${{ steps.zip.outputs.zip_name }}
          retention-days: 7
          
      - name: دریافت لینک Artifact
        id: get-artifact
        run: |
          RUN_ID=${{ github.run_id }}
          REPO="${{ github.repository }}"
          ARTIFACT_URL="https://github.com/$REPO/actions/runs/$RUN_NAME"
          echo "url=$ARTIFACT_URL" >> $GITHUB_OUTPUT
          
      - name: ارسال نتیجه به Webhook (اگر تنظیم شده)
        if: ${{ github.event.inputs.webhook_url != '' }}
        run: |
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -X POST "${{ github.event.inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"status\":\"completed\",\"download_url\":\"$DOWNLOAD_URL\",\"run_id\":\"${{ github.run_id }}\"}"
