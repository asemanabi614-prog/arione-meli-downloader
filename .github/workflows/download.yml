name: Auto Download

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: "Direct file URL"
        required: true
        type: string
      output_name:
        description: "Optional output file name"
        required: false
        type: string
      split_enabled:
        description: "Enable split for files larger than 100MB"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-download-${{ github.ref }}
  cancel-in-progress: false

jobs:
  download:
    runs-on: ubuntu-latest

    env:
      DOWNLOAD_DIR: download-temp
      MAX_DIRECT_BYTES: 104857600
      PART_SIZE: 90M
      INPUT_URL: ${{ inputs.file_url }}
      INPUT_OUTPUT_NAME: ${{ inputs.output_name }}
      SPLIT_ENABLED: ${{ inputs.split_enabled }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install aria2 and zip
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Prepare download directory and cleanup old files
        run: |
          mkdir -p "$DOWNLOAD_DIR"
          find "$DOWNLOAD_DIR" -type f -mtime +2 -delete

      - name: Resolve filename
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          RAW_NAME="${INPUT_OUTPUT_NAME:-}"

          if [ -z "$RAW_NAME" ]; then
            URL_PATH="${INPUT_URL%%\?*}"
            RAW_NAME="$(basename "$URL_PATH")"
          fi

          if [ -z "$RAW_NAME" ] || [ "$RAW_NAME" = "/" ] || [ "$RAW_NAME" = "." ]; then
            RAW_NAME="downloaded-file"
          fi

          SAFE_NAME="$(echo "$RAW_NAME" | tr -cd '[:alnum:]._-' | sed 's/^[.]*//')"

          if [ -z "$SAFE_NAME" ]; then
            SAFE_NAME="downloaded-file"
          fi

          TS="$(date +%Y%m%d-%H%M%S)"
          BASE="${SAFE_NAME%.*}"
          EXT="${SAFE_NAME##*.}"

          if [ "$BASE" = "$EXT" ]; then
            FINAL_NAME="${BASE}-${TS}"
          else
            FINAL_NAME="${BASE}-${TS}.${EXT}"
          fi

          echo "safe_name=$FINAL_NAME" >> "$GITHUB_OUTPUT"
          echo "base_name=${FINAL_NAME%.*}" >> "$GITHUB_OUTPUT"

      - name: Download file with aria2
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p work

          aria2c \
            --continue=true \
            --max-connection-per-server=16 \
            --split=16 \
            --min-split-size=1M \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            --dir=work \
            --out="${{ steps.meta.outputs.safe_name }}" \
            "$INPUT_URL"

      - name: Process downloaded file
        id: process
        shell: bash
        run: |
          set -euo pipefail

          FILE="work/${{ steps.meta.outputs.safe_name }}"
          FINAL_NAME="${{ steps.meta.outputs.safe_name }}"
          BASE_NAME="${{ steps.meta.outputs.base_name }}"

          if [ ! -f "$FILE" ]; then
            echo "Downloaded file not found"
            exit 1
          fi

          SIZE="$(stat -c%s "$FILE")"

          echo "Downloaded size: $SIZE bytes"

          if [ "$SIZE" -le "$MAX_DIRECT_BYTES" ]; then
            mv "$FILE" "$DOWNLOAD_DIR/$FINAL_NAME"
            echo "mode=direct" >> "$GITHUB_OUTPUT"
            echo "final_file=$FINAL_NAME" >> "$GITHUB_OUTPUT"
            echo "final_kind=file" >> "$GITHUB_OUTPUT"
          else
            if [ "$SPLIT_ENABLED" != "true" ]; then
              echo "File is larger than 100MB and split is disabled."
              exit 1
            fi

            PART_PREFIX="$DOWNLOAD_DIR/${FINAL_NAME}.part-"

            split -b "$PART_SIZE" -d --additional-suffix=.part "$FILE" "$PART_PREFIX"

            rm -f "$FILE"

            PART_COUNT="$(find "$DOWNLOAD_DIR" -maxdepth 1 -type f -name "${FINAL_NAME}.part-*.part" | wc -l | tr -d ' ')"

            cat > "$DOWNLOAD_DIR/${FINAL_NAME}.manifest.json" <<EOF
          {
            "name": "$FINAL_NAME",
            "type": "split",
            "partSize": "$PART_SIZE",
            "partCount": $PART_COUNT,
            "originalSize": $SIZE,
            "createdAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "rebuild": "cat ${FINAL_NAME}.part-*.part > ${FINAL_NAME}"
          }
          EOF

            echo "mode=split" >> "$GITHUB_OUTPUT"
            echo "final_file=${FINAL_NAME}.manifest.json" >> "$GITHUB_OUTPUT"
            echo "final_kind=manifest" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit direct/small files and cleanup changes
        if: steps.process.outputs.mode == 'direct'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$DOWNLOAD_DIR/"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Download: ${{ steps.process.outputs.final_file }}"

          for i in 1 2 3; do
            if git push; then
              exit 0
            fi

            git pull --rebase origin "${GITHUB_REF_NAME}"
            sleep $((i * 3))
          done

          echo "Push failed after 3 retries."
          exit 1

      - name: Commit split files in safe batches
        if: steps.process.outputs.mode == 'split'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          FINAL_NAME="${{ steps.meta.outputs.safe_name }}"

          git add "$DOWNLOAD_DIR/${FINAL_NAME}.manifest.json"

          if ! git diff --cached --quiet; then
            git commit -m "Download manifest: $FINAL_NAME"

            for i in 1 2 3; do
              if git push; then
                break
              fi

              git pull --rebase origin "${GITHUB_REF_NAME}"
              sleep $((i * 3))

              if [ "$i" = "3" ]; then
                echo "Push failed after 3 retries."
                exit 1
              fi
            done
          fi

          mapfile -t PARTS < <(find "$DOWNLOAD_DIR" -maxdepth 1 -type f -name "${FINAL_NAME}.part-*.part" | sort)

          BATCH=0

          for PART in "${PARTS[@]}"; do
            SIZE="$(stat -c%s "$PART")"

            if [ "$SIZE" -gt "$MAX_DIRECT_BYTES" ]; then
              echo "Part is larger than 100MB: $PART"
              exit 1
            fi

            BATCH=$((BATCH + 1))

            git add "$PART"
            git commit -m "Download part $BATCH: $FINAL_NAME"

            for i in 1 2 3; do
              if git push; then
                break
              fi

              git pull --rebase origin "${GITHUB_REF_NAME}"
              sleep $((i * 3))

              if [ "$i" = "3" ]; then
                echo "Push failed after 3 retries."
                exit 1
              fi
            done
          done

      - name: Print final raw URL
        shell: bash
        run: |
          set -euo pipefail

          REPO="${GITHUB_REPOSITORY}"
          BRANCH="${GITHUB_REF_NAME}"

          echo ""
          echo "Download folder:"
          echo "https://github.com/${REPO}/tree/${BRANCH}/download-temp"
          echo ""

          if [ "${{ steps.process.outputs.mode }}" = "direct" ]; then
            echo "Final raw URL:"
            echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${{ steps.process.outputs.final_file }}"
          else
            echo "File was split because it is larger than 100MB."
            echo "Manifest raw URL:"
            echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${{ steps.process.outputs.final_file }}"
            echo ""
            echo "Parts:"
            find "$DOWNLOAD_DIR" -maxdepth 1 -type f -name "${{ steps.meta.outputs.safe_name }}.part-*.part" | sort | while read -r f; do
              b="$(basename "$f")"
              echo "https://raw.githubusercontent.com/${REPO}/${BRANCH}/download-temp/${b}"
            done
          fi
