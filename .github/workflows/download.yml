name: File Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: 'نام فایل خروجی (اختیاری)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip

      - name: 📥 Download file
        run: |
          FILE_URL="${{ github.event.inputs.file_url }}"
          FILE_NAME="${{ github.event.inputs.file_name }}"
          
          # Create downloads folder
          mkdir -p downloads
          
          # Download with aria2
          cd downloads
          
          if [ -n "$FILE_NAME" ] && [ "$FILE_NAME" != "" ]; then
            aria2c -x 16 -s 16 --max-tries=5 --timeout=60 "$FILE_URL" --out="$FILE_NAME"
          else
            aria2c -x 16 -s 16 --max-tries=5 --timeout=60 "$FILE_URL"
          fi
          
          cd ..
          
          # Get downloaded filename
          DOWNLOADED_FILE=$(ls -1 downloads/ | head -1)
          echo "DOWNLOADED_FILE=$DOWNLOADED_FILE" >> $GITHUB_ENV
          
          FILE_SIZE=$(stat -c%s "downloads/$DOWNLOADED_FILE")
          FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
          echo "FILE_SIZE_MB=$FILE_SIZE_MB" >> $GITHUB_ENV

      - name: ✂️ Split large files (over 90MB)
        run: |
          FILE="downloads/${{ env.DOWNLOADED_FILE }}"
          SIZE=$(stat -c%s "$FILE")
          LIMIT=$((90 * 1024 * 1024))
          
          if [ $SIZE -gt $LIMIT ]; then
            echo "File is ${FILE_SIZE_MB}MB, splitting into 90MB parts..."
            
            # Split into 90MB parts
            cd downloads
            split -b 90m -d "${{ env.DOWNLOADED_FILE }}" "part_" --additional-suffix=".part"
            rm "${{ env.DOWNLOADED_FILE }}"
            
            # Create ZIP archive of all parts
            zip -r "${{ env.DOWNLOADED_FILE }}.zip" *.part
            rm *.part
            
            cd ..
            echo "FINAL_FILE=${{ env.DOWNLOADED_FILE }}.zip" >> $GITHUB_ENV
            echo "SPLIT=true" >> $GITHUB_ENV
          else
            echo "FINAL_FILE=${{ env.DOWNLOADED_FILE }}" >> $GITHUB_ENV
            echo "SPLIT=false" >> $GITHUB_ENV
          fi

      - name: 📤 Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add and commit
          git add downloads/
          git commit -m "Add downloaded file: ${{ env.FINAL_FILE }}" || echo "Nothing to commit"
          git push
          
          # Get the raw URL
          RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/downloads/${{ env.FINAL_FILE }}"
          echo "RAW_URL=$RAW_URL" >> $GITHUB_ENV

      - name: 📋 Job summary
        run: |
          echo "## ✅ Download Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | \`${{ env.FINAL_FILE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${{ env.FILE_SIZE_MB }} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| **Split** | ${{ env.SPLIT }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Raw URL** | [Download](${{ env.RAW_URL }}) |" >> $GITHUB_STEP_SUMMARY
